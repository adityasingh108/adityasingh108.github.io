<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found | Aditya Kumar Singh</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .error-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            position: relative;
        }
        .error-container {
            text-align: center;
            max-width: 700px;
        }
        .error-code {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 8rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--nebula-purple), var(--cyber-cyan), var(--plasma-pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: glitch 1s linear infinite;
            margin-bottom: 1rem;
        }
        .error-title {
            font-size: 2rem;
            margin-bottom: 1rem;
            color: var(--starlight);
        }
        .error-subtitle {
            color: var(--dim-star);
            margin-bottom: 2rem;
        }
        .flag-box {
            margin: 2rem 0;
            text-align: left;
        }
        .flag-display {
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.2rem;
            color: var(--success-green);
            background: var(--deep-space);
            padding: 1rem 1.5rem;
            border-radius: 8px;
            border: 1px solid var(--cosmic-border);
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-top: 1rem;
        }
        .flag-display i {
            color: var(--nebula-purple);
        }
        .error-actions {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 2rem;
        }
        @keyframes glitch {
            0%, 100% { transform: translate(0); }
            20% { transform: translate(-2px, 2px); }
            40% { transform: translate(-2px, -2px); }
            60% { transform: translate(2px, 2px); }
            80% { transform: translate(2px, -2px); }
        }
        @media (max-width: 768px) {
            .error-code { font-size: 5rem; }
        }
    </style>
</head>
<body>
    <canvas id="matrix-canvas" class="matrix-bg"></canvas>

    <div class="error-page">
        <div class="error-container">
            <div class="error-code">404</div>
            <h1 class="error-title glitch-text" data-text="CTF Challenge: Page Not Found">CTF Challenge: Page Not Found</h1>
            <p class="error-subtitle">Looks like you've stumbled into uncharted territory. But wait... is that a flag?</p>
            
            <div class="terminal-box flag-box">
                <div class="terminal-header">
                    <span class="terminal-btn red"></span>
                    <span class="terminal-btn yellow"></span>
                    <span class="terminal-btn green"></span>
                    <span class="terminal-title">aditya@portfolio:~$ find_flag</span>
                </div>
                <div class="terminal-body">
                    <p><span class="terminal-prompt">$</span> <span class="terminal-command">find_flag</span></p>
                    <p class="terminal-output">Searching for hidden flag...</p>
                    <p class="terminal-output">Flag found! Decode this:</p>
                    <div class="flag-display">
                        <i class="fas fa-flag"></i>
                        <span id="flag-text">FLAG{...}</span>
                    </div>
                    <p><span class="terminal-prompt">$</span> <span class="terminal-command blink">_</span></p>
                </div>
            </div>
            
            <div class="error-actions">
                <a href="index.html" class="btn btn-primary">
                    <i class="fas fa-home"></i> Back to Home
                </a>
                <a href="https://github.com/adityasingh108" target="_blank" rel="noopener noreferrer" class="btn btn-secondary">
                    <i class="fab fa-github"></i> Explore GitHub
                </a>
            </div>
        </div>
    </div>

    <script src="js/main.js"></script>
    <script>
        // Generate random flag with base64 encoded github:linkedin IDs
        function generateFlag() {
            const githubId = 'adityasingh108';
            const linkedinId = 'aditya-singh-9ab9b81aa';
            const combined = `${githubId}:${linkedinId}`;
            const encoded = btoa(combined);
            const randomPrefix = Math.random().toString(36).substring(2, 8).toUpperCase();
            return `FLAG{${randomPrefix}_${encoded}}`;
        }
        
        document.getElementById('flag-text').textContent = generateFlag();
    </script>
</body>
</html>
